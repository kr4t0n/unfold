frontend:
  replicaCount: 1
  image:
    repository: ""
    tag: "main"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3000
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

backend:
  replicaCount: 1
  image:
    repository: ""
    tag: "main"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8000
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  env:
    NEO4J_URI: "bolt://neo4j:7687"
    NEO4J_USER: "neo4j"
  secretName: ""

neo4j:
  enabled: true
  image:
    repository: neo4j
    tag: "5"
    pullPolicy: IfNotPresent
  auth:
    password: "changeme"
  service:
    type: ClusterIP
    httpPort: 7474
    boltPort: 7687
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

ingress:
  enabled: false
  className: ""
  annotations: {}
  host: unfold.local
  tls: []

imagePullSecrets: []
