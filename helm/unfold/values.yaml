frontend:
  replicaCount: 1
  image:
    repository: kr4t0n/unfold-frontend
    tag: latest
    pullPolicy: IfNotPresent
  resources: {}

backend:
  replicaCount: 1
  image:
    repository: kr4t0n/unfold-backend
    tag: latest
    pullPolicy: IfNotPresent
  resources: {}
  env:
    NEO4J_URI: bolt://neo4j:7687
    NEO4J_USER: neo4j
    NEO4J_PASSWORD: changeme
  secretName:

ingress:
  enabled: false
  className:
  annotations: {}
  host: unfold.local
  tls: []

