{{- if .Values.neo4j.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "unfold.fullname" . }}-neo4j
  labels:
    {{- include "unfold.labels" . | nindent 4 }}
    app.kubernetes.io/component: neo4j
spec:
  serviceName: {{ include "unfold.fullname" . }}-neo4j
  replicas: 1
  selector:
    matchLabels:
      {{- include "unfold.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: neo4j
  template:
    metadata:
      labels:
        {{- include "unfold.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: neo4j
    spec:
      containers:
        - name: neo4j
          image: "neo4j:5"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 7474
              protocol: TCP
            - name: bolt
              containerPort: 7687
              protocol: TCP
          env:
            - name: NEO4J_AUTH
              value: "{{ .Values.backend.env.NEO4J_USER }}/{{ .Values.neo4j.auth.password }}"
          {{- if .Values.neo4j.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: /data
          {{- end }}
          livenessProbe:
            exec:
              command:
                - cypher-shell
                - -u
                - "{{ .Values.backend.env.NEO4J_USER }}"
                - -p
                - "{{ .Values.neo4j.auth.password }}"
                - "RETURN 1"
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            exec:
              command:
                - cypher-shell
                - -u
                - "{{ .Values.backend.env.NEO4J_USER }}"
                - -p
                - "{{ .Values.neo4j.auth.password }}"
                - "RETURN 1"
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            {{- if .Values.neo4j.resources }}
            {{- toYaml .Values.neo4j.resources | nindent 12 }}
            {{- else }}
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
            {{- end }}
  {{- if .Values.neo4j.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.neo4j.persistence.storageClass }}
        storageClassName: {{ .Values.neo4j.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.neo4j.persistence.size }}
  {{- end }}
{{- end }}
