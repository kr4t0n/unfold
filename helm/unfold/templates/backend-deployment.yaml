apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "unfold.fullname" . }}-backend
  labels:
    {{- include "unfold.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      {{- include "unfold.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        {{- include "unfold.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: NEO4J_URI
              value: {{ .Values.backend.env.NEO4J_URI | quote }}
            - name: NEO4J_USER
              value: {{ .Values.backend.env.NEO4J_USER | quote }}
            - name: NEO4J_PASSWORD
              {{- if .Values.backend.secretName }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.secretName }}
                  key: NEO4J_PASSWORD
              {{- else }}
              value: {{ .Values.neo4j.auth.password | quote }}
              {{- end }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
