name: Publish Helm Chart

on:
  push:
    branches:
      - main
    paths:
      - 'helm/**'
      - '.github/workflows/helm.yml'

jobs:
  publish:
    name: Package & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Bump chart version
        id: version
        run: |
          CURRENT="0.0.0"
          if [ -f gh-pages/index.yaml ]; then
            PARSED=$(grep '^  *version:' gh-pages/index.yaml \
              | awk '{print $2}' | sort -V | tail -1)
            if [ -n "$PARSED" ]; then
              CURRENT="$PARSED"
            fi
          fi
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          sed -i "s/^version:.*/version: $NEXT/" helm/unfold/Chart.yaml
          echo "Bumped chart version from $CURRENT to $NEXT"

      - name: Package chart
        run: helm package helm/unfold -d .cr-release-packages

      - name: Update index and publish
        run: |
          helm repo index .cr-release-packages \
            --url https://kr4t0n.github.io/unfold \
            --merge gh-pages/index.yaml
          cp .cr-release-packages/*.tgz gh-pages/
          cp .cr-release-packages/index.yaml gh-pages/index.yaml
          cd gh-pages
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"
          git add .
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: publish helm chart ${{ steps.version.outputs.version }}"
          git push
